<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanque Team | Painel Administrativo</title>
    <link rel="icon" href="https://iili.io/qC543c7.png" type="image/png">
    
    <script>
        if (localStorage.getItem('tanque_theme') === 'dark' || (!('tanque_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: { red: '#D90429', dark: '#1B1B1B' } },
                    fontFamily: { sans: ['Roboto', 'sans-serif'], display: ['Oswald', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .card-active { border-bottom: 4px solid #D90429; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans text-gray-800 dark:text-gray-200 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar-menu" class="fixed md:relative inset-y-0 left-0 transform -translate-x-full md:translate-x-0 w-64 bg-brand-dark text-white flex flex-col z-40 transition-transform duration-300 border-r border-gray-800">
        <div class="p-6 border-b border-gray-800 flex items-center gap-3">
            <img src="https://iili.io/qC543c7.png" class="h-8">
            <span class="font-display font-bold text-xl text-brand-red">ADMIN</span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="window.switchMainView('students')" id="nav-students" class="w-full flex items-center px-4 py-3 bg-brand-red rounded-lg font-bold"><i class="fa-solid fa-users w-6"></i> Alunos</button>
            <button onclick="window.switchMainView('experimental')" id="nav-experimental" class="w-full flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 rounded-lg font-bold"><i class="fa-solid fa-fire w-6"></i> Aulas Exp.</button>
            <button onclick="window.switchMainView('financial')" id="nav-financial" class="w-full flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 rounded-lg font-bold"><i class="fa-solid fa-file-invoice-dollar w-6"></i> Financeiro</button>
            <button onclick="window.switchMainView('notices')" id="nav-notices" class="w-full flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 rounded-lg font-bold"><i class="fa-solid fa-bullhorn w-6"></i> Mural</button>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="window.toggleTheme()" class="w-full py-2 mb-2 text-yellow-500"><i class="fa-solid fa-sun"></i> Alternar Tema</button>
            <button onclick="window.handleLogout()" class="w-full py-2 text-red-500 font-bold"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
        </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white dark:bg-gray-800 shadow flex items-center justify-between px-6 border-b dark:border-gray-700">
            <button onclick="window.toggleMobileMenu()" class="md:hidden text-2xl"><i class="fa-solid fa-bars"></i></button>
            <div class="relative w-96 hidden md:block">
                <input type="text" id="searchInput" onkeyup="window.filterTable()" placeholder="Buscar aluno..." class="w-full pl-10 pr-4 py-2 rounded-full border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-brand-red">
                <i class="fa-solid fa-search absolute left-4 top-3 text-gray-400"></i>
            </div>
            <button onclick="window.openCheckinModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2"><i class="fa-solid fa-camera"></i> <span class="hidden md:block">Check-in</span></button>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <!-- VIEW ALUNOS -->
            <div id="view-students" class="animate-fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold uppercase font-display">Gestão de Alunos</h2>
                    <button onclick="window.openAdminRegisterModal()" class="bg-brand-red text-white px-4 py-2 rounded font-bold">+ Novo Aluno</button>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 dark:bg-gray-700 text-xs uppercase text-gray-500">
                            <tr>
                                <th class="px-6 py-4">Aluno</th>
                                <th class="px-6 py-4">Faixa</th>
                                <th class="px-6 py-4 text-center">Status</th>
                                <th class="px-6 py-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="students-table-body" class="divide-y dark:divide-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <!-- VIEW FINANCEIRO -->
            <div id="view-financial" class="hidden animate-fade-in">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border-l-4 border-green-500 shadow">
                        <p class="text-xs font-bold text-gray-400 uppercase">Recebido</p>
                        <p id="fin-stat-paid" class="text-2xl font-bold">R$ 0,00</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border-l-4 border-red-500 shadow">
                        <p class="text-xs font-bold text-gray-400 uppercase">Pendente</p>
                        <p id="fin-stat-pending" class="text-2xl font-bold">R$ 0,00</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border-l-4 border-blue-500 shadow">
                        <p class="text-xs font-bold text-gray-400 uppercase">Total Esperado</p>
                        <p id="fin-stat-total" class="text-2xl font-bold">R$ 0,00</p>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 dark:bg-gray-700 text-xs uppercase">
                            <tr>
                                <th class="px-6 py-4">Aluno</th>
                                <th class="px-6 py-4">Plano</th>
                                <th class="px-6 py-4 text-center">Status</th>
                                <th class="px-6 py-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="financial-table-body" class="divide-y dark:divide-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <!-- VIEW EXPERIMENTAL -->
            <div id="view-experimental" class="hidden animate-fade-in">
                <h2 class="text-2xl font-bold uppercase font-display mb-6">Aulas Experimentais</h2>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 dark:bg-gray-700 text-xs uppercase">
                            <tr>
                                <th class="px-6 py-4">Visitante</th>
                                <th class="px-6 py-4">Data/Hora</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="experimental-table-body" class="divide-y dark:divide-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL: NOVO ALUNO (CORRIGIDO) -->
    <div id="admin-register-modal" class="fixed inset-0 z-[100] hidden bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 border-t-4 border-brand-red">
            <h3 class="text-xl font-bold mb-4 uppercase">Novo Cadastro de Aluno</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="text-xs font-bold text-gray-500">Nome</label><input type="text" id="reg-name" class="w-full border rounded p-2 dark:bg-gray-700"></div>
                <div><label class="text-xs font-bold text-gray-500">Nascimento</label><input type="text" id="reg-dob" placeholder="DD/MM/AAAA" class="w-full border rounded p-2 dark:bg-gray-700"></div>
                <div><label class="text-xs font-bold text-gray-500">Plano</label>
                    <select id="reg-plan" class="w-full border rounded p-2 dark:bg-gray-700">
                        <option value="adulto-mensal">Adulto Mensal</option>
                        <option value="infantil-mensal">Infantil Mensal</option>
                        <option value="combo-familia">Combo Família</option>
                    </select>
                </div>
                <div><label class="text-xs font-bold text-gray-500">WhatsApp</label><input type="text" id="reg-phone" class="w-full border rounded p-2 dark:bg-gray-700"></div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="document.getElementById('admin-register-modal').classList.add('hidden')" class="px-4 py-2 text-gray-500">Cancelar</button>
                <button onclick="window.saveAdminNewStudent()" class="px-6 py-2 bg-brand-red text-white rounded font-bold">Salvar Aluno</button>
            </div>
        </div>
    </div>

    <!-- MODAL: CHECK-IN (CAMERA) -->
    <div id="checkin-modal" class="fixed inset-0 z-[100] hidden bg-black flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-lg rounded-xl overflow-hidden shadow-2xl">
            <div class="bg-green-600 p-4 text-white flex justify-between">
                <h3 class="font-bold"><i class="fa-solid fa-camera"></i> LEITOR DE QR CODE</h3>
                <button onclick="window.closeCheckinModal()"><i class="fa-solid fa-times"></i></button>
            </div>
            <div id="reader" class="w-full bg-black" style="min-height: 300px;"></div>
            <div id="checkin-result" class="p-6 text-center font-bold text-gray-500">Aponte o QR Code para a câmera</div>
        </div>
    </div>

    <!-- Firebase e Lógica -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWlrrfNn6q4GhhL2H7goHjQMd3MsprxOE",
            authDomain: "tanqueteambjj.firebaseapp.com",
            projectId: "tanqueteambjj",
            storageBucket: "tanqueteambjj.firebasestorage.app",
            messagingSenderId: "410605992451",
            appId: "1:410605992451:web:f0f341f4594fe75f376c36"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.db = db;

        const APP_ID = "tanqueteam-bjj";
        window.students = [];
        window.experimental = [];
        window.currentView = 'students';
        let html5QrCode = null;

        // --- INICIALIZAR ---
        signInAnonymously(auth).then(() => {
            window.loadData();
            window.loadExperimentalData();
        });

        window.loadData = async () => {
            const snap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'students'));
            window.students = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            window.renderTable();
            if(window.currentView === 'financial') window.renderFinancialTable();
        };

        window.loadExperimentalData = async () => {
            const snap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'experimental'));
            window.experimental = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            window.renderExperimentalTable();
        };

        // --- RENDERIZAR ALUNOS ---
        window.renderTable = () => {
            const tbody = document.getElementById('students-table-body');
            tbody.innerHTML = '';
            window.students.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold">${s.name}</td>
                    <td class="px-6 py-4 text-xs">${s.belt || 'Branca'}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-2 py-1 rounded text-[10px] font-bold ${s.enrollmentStatus === 'Ativo' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${s.enrollmentStatus || 'Ativo'}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button class="text-blue-500 hover:scale-110 px-2"><i class="fa-solid fa-eye"></i></button>
                        <button class="text-orange-500 hover:scale-110 px-2"><i class="fa-solid fa-pen"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        // --- RENDERIZAR EXPERIMENTAL ---
        window.renderExperimentalTable = () => {
            const tbody = document.getElementById('experimental-table-body');
            tbody.innerHTML = '';
            window.experimental.forEach(e => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold">${e.name}</td>
                    <td class="px-6 py-4 text-xs">${e.date} às ${e.time}</td>
                    <td class="px-6 py-4"><span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-bold">${e.status || 'Agendado'}</span></td>
                    <td class="px-6 py-4 text-center"><button class="text-green-500 font-bold"><i class="fa-solid fa-user-plus"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        };

        // --- FINANCEIRO ---
        window.PLAN_DICT = {
            'adulto-mensal': 168.90, 'infantil-mensal': 189.90, 'combo-familia': 362.02
        };

        window.renderFinancialTable = () => {
            const tbody = document.getElementById('financial-table-body');
            tbody.innerHTML = '';
            let paid = 0, pending = 0;
            window.students.forEach(s => {
                const price = window.PLAN_DICT[s.plan] || 0;
                const isPaid = s.paymentStatus === 'Em dia';
                if(isPaid) paid += price; else pending += price;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold">${s.name}</td>
                    <td class="px-6 py-4 text-xs uppercase">${s.plan} (R$ ${price})</td>
                    <td class="px-6 py-4 text-center">${isPaid ? '<span class="text-green-600 font-bold">PAGO</span>' : '<span class="text-red-600 font-bold">PENDENTE</span>'}</td>
                    <td class="px-6 py-4 text-center"><button class="bg-green-600 text-white px-2 py-1 rounded text-xs">PAGAR</button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('fin-stat-paid').innerText = `R$ ${paid.toFixed(2)}`;
            document.getElementById('fin-stat-pending').innerText = `R$ ${pending.toFixed(2)}`;
            document.getElementById('fin-stat-total').innerText = `R$ ${(paid + pending).toFixed(2)}`;
        };

        // --- MODAIS E AÇÕES ---
        window.openAdminRegisterModal = () => document.getElementById('admin-register-modal').classList.remove('hidden');
        
        window.saveAdminNewStudent = async () => {
            const name = document.getElementById('reg-name').value;
            const plan = document.getElementById('reg-plan').value;
            if(!name) return alert("Preencha o nome!");
            
            await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'students'), {
                name, plan, enrollmentStatus: 'Ativo', paymentStatus: 'Pendente', registrationDate: new Date().toISOString()
            });
            document.getElementById('admin-register-modal').classList.add('hidden');
            window.loadData();
        };

        // --- CAMERA CHECK-IN ---
        window.openCheckinModal = () => {
            document.getElementById('checkin-modal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (decodedText) => {
                    document.getElementById('checkin-result').innerText = "Check-in: " + decodedText;
                    window.playBeep();
                }, 
                (err) => {}
            ).catch(err => {
                 alert("Não foi possível abrir a câmera. Verifique as permissões.");
            });
        };

        window.closeCheckinModal = () => {
            if(html5QrCode) html5QrCode.stop().then(() => html5QrCode.clear());
            document.getElementById('checkin-modal').classList.add('hidden');
        };

        window.playBeep = () => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        };

        // --- NAVEGAÇÃO ---
        window.switchMainView = (v) => {
            window.currentView = v;
            ['students', 'experimental', 'financial', 'notices'].forEach(view => {
                document.getElementById('view-' + view)?.classList.toggle('hidden', view !== v);
                document.getElementById('nav-' + view)?.classList.toggle('bg-brand-red', view === v);
                document.getElementById('nav-' + view)?.classList.toggle('text-white', view === v);
            });
            if(v === 'financial') window.renderFinancialTable();
        };

        window.toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('tanque_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };
    </script>
</body>
</html>
