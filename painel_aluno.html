<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanque Team | Painel do Aluno</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { red: '#d90429', dark: '#1b1b1b', light: '#edf2f4' }
                    },
                    fontFamily: { display: ['ui-sans-serif', 'system-ui', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #f3f4f6; 
            background-image: radial-gradient(#d1d5db 1px, transparent 1px); 
            background-size: 20px 20px; 
        }
        .dark body { 
            background-color: #111827; 
            background-image: radial-gradient(#1f2937 1px, transparent 1px); 
        }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.85rem; border: 1px solid transparent; }
        .calendar-day.present { background-color: #dcfce7; color: #166534; font-weight: bold; border-color: #86efac; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .dark .calendar-day.present { background-color: rgba(22, 163, 74, 0.2); color: #4ade80; border-color: rgba(22, 163, 74, 0.5); }
        .calendar-header-day { text-transform: uppercase; color: #9ca3af; text-align: center; padding-bottom: 4px; font-size: 0.7rem; font-weight: bold; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, setDoc, deleteDoc, query, where, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. FIREBASE CONFIGURATION & INITIALIZATION
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCWlrrfNn6q4GhhL2H7goHjQMd3MsprxOE",
            authDomain: "tanqueteambjj.firebaseapp.com",
            projectId: "tanqueteambjj",
            storageBucket: "tanqueteambjj.firebasestorage.app",
            messagingSenderId: "410605992451",
            appId: "1:410605992451:web:f0f341f4594fe75f376c36"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tanqueteam-bjj';

        // Plans Dictionary
        const PLANS_MAP = {
            "infantil-mensal": { price: 189.90, short: "Infantil Mensal" },
            "adulto-mensal": { price: 168.90, short: "Adulto Mensal" },
            "combo-familia": { price: 362.00, short: "Combo Família" },
            "isento": { price: 0, short: "Isento" },
            "dependente": { price: 0, short: "Dependente" }
        };

        const ACHIEVEMENTS = [
            { name: "Primeiro Passo", desc: "A jornada começa aqui.", icon: "fa-solid fa-shoe-prints", color: "text-blue-500", req: 0 },
            { name: "Iniciante", desc: "10 Treinos concluídos.", icon: "fa-solid fa-fire", color: "text-orange-500", req: 10 },
            { name: "Consistente", desc: "25 Treinos concluídos.", icon: "fa-solid fa-dumbbell", color: "text-gray-500", req: 25 },
            { name: "Guerreiro", desc: "50 Treinos concluídos.", icon: "fa-solid fa-shield-halved", color: "text-purple-500", req: 50 },
            { name: "Veterano", desc: "100 Treinos. Jiu-Jitsu na veia.", icon: "fa-solid fa-crown", color: "text-yellow-500", req: 100 },
            { name: "Mestre", desc: "500 Treinos. Uma lenda viva.", icon: "fa-solid fa-dragon", color: "text-red-600", req: 500 }
        ];

        // ==========================================
        // 2. REUSABLE COMPONENTS
        // ==========================================
        const Modal = ({ isOpen, onClose, title, children, icon, color = "brand-red" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                    <div className={`bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all border-t-4 border-${color} animate-slide-up`}>
                        <div className="bg-gray-50 dark:bg-gray-700 px-6 py-4 flex justify-between items-center border-b border-gray-200 dark:border-gray-600">
                            <h3 className="text-gray-800 dark:text-white font-display font-bold text-lg flex items-center">
                                {icon && <i className={`${icon} text-${color} mr-2`}></i>}
                                {title}
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-red-500 transition text-xl">
                                <i className="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        const BeltDisplay = ({ beltStr }) => {
            if (!beltStr) return null;
            const beltMap = { "Branca": "#ffffff", "Cinza": "#9ca3af", "Amarela": "#fbbf24", "Laranja": "#f97316", "Verde": "#10b981", "Azul": "#3b82f6", "Roxa": "#8b5cf6", "Marrom": "#78350f", "Preta": "#000000" };
            let color = "#ffffff", degrees = 0, name = "Branca";
            
            for (const [key, val] of Object.entries(beltMap)) {
                if (beltStr.includes(key)) { color = val; name = key; break; }
            }
            
            const match = beltStr.match(/(\d)º/);
            if (match) degrees = parseInt(match[1]);
            const tipColor = name === "Preta" ? "#dc2626" : "#000000";
            
            const stripes = [];
            for (let i = 0; i < degrees; i++) {
                stripes.push(<rect key={i} x={190 - (11 * i) - 6} y="0" width="6" height="40" fill="#ffffff" />);
            }

            return (
                <svg width="100%" height="100%" viewBox="0 0 200 40" preserveAspectRatio="none">
                    <rect x="0" y="0" width="200" height="40" fill={color} />
                    <rect x="160" y="0" width="40" height="40" fill={tipColor} />
                    {stripes}
                </svg>
            );
        };

        const AlertBox = ({ type, title, message }) => {
            const styles = {
                success: "bg-green-50 border-green-200 text-green-800 dark:bg-green-900/20 dark:border-green-800 dark:text-green-200",
                error: "bg-red-50 border-red-200 text-red-800 dark:bg-red-900/20 dark:border-red-800 dark:text-red-200",
                info: "bg-blue-50 border-blue-200 text-blue-800 dark:bg-blue-900/20 dark:border-blue-800 dark:text-blue-200",
                warning: "bg-yellow-50 border-yellow-200 text-yellow-800 dark:bg-yellow-900/20 dark:border-yellow-800 dark:text-yellow-200"
            };
            const icons = { success: "fa-check-circle", error: "fa-circle-xmark", info: "fa-circle-info", warning: "fa-triangle-exclamation" };
            
            return (
                <div className={`p-4 border rounded-xl shadow-sm flex items-start gap-3 ${styles[type]}`}>
                    <i className={`fa-solid ${icons[type]} text-xl mt-0.5`}></i>
                    <div>
                        <h4 className="font-bold text-sm md:text-base leading-tight">{title}</h4>
                        <p className="text-sm mt-1 whitespace-pre-wrap opacity-90">{message}</p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. MAIN VIEWS
        // ==========================================
        const DigitalCard = ({ student, isOpen, onClose }) => {
            if (!student) return null;
            const isBlocked = student.paymentStatus === "Pendente";
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${student.id}`;

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Carteirinha Digital" icon="fa-solid fa-id-card">
                    <div className="flex flex-col items-center">
                        <div className="bg-white border border-gray-300 rounded-xl overflow-hidden relative shadow-inner flex flex-col w-[260px] h-[410px]">
                            <div className="bg-brand-dark p-3 flex items-center justify-center gap-2 shrink-0 border-b-4 border-brand-red">
                                <img src="https://iili.io/qC543c7.png" className="h-6 w-6 object-contain" alt="Logo" />
                                <span className="font-display font-bold text-sm tracking-widest uppercase text-white">TANQUE TEAM BJJ</span>
                            </div>
                            
                            <div className="p-4 flex flex-col items-center flex-1 relative bg-white">
                                <img src="https://iili.io/qC543c7.png" className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-32 h-32 opacity-5 pointer-events-none grayscale" alt="Bg" />
                                
                                <div className="w-20 h-20 bg-gray-100 rounded-full border-2 border-gray-200 overflow-hidden mb-3 shadow-sm z-10 flex-shrink-0">
                                    {student.photoBase64 ? 
                                        <img src={student.photoBase64} className="w-full h-full object-cover" alt="Profile" /> : 
                                        <div className="w-full h-full flex items-center justify-center text-gray-400 font-bold text-2xl">{student.name.charAt(0)}</div>
                                    }
                                </div>
                                
                                <div className="text-center z-10 w-full mb-3">
                                    <h4 className="font-bold text-sm text-gray-900 leading-tight uppercase truncate">{student.name}</h4>
                                    <p className="text-[10px] text-brand-red font-bold uppercase truncate mt-0.5">{student.belt || "Faixa Branca"}</p>
                                    <p className="text-[9px] text-gray-500 uppercase font-bold tracking-wider truncate mt-0.5">{student.plan || "Plano Padrão"}</p>
                                </div>

                                {isBlocked ? (
                                    <div className="mt-auto bg-red-50 p-2 border border-red-200 rounded shadow-sm z-10 flex flex-col items-center justify-center w-28 h-28 text-center">
                                        <i className="fa-solid fa-lock text-red-500 text-3xl mb-1"></i>
                                        <span className="text-[10px] font-bold text-red-700 leading-tight uppercase">Acesso<br/>Bloqueado</span>
                                    </div>
                                ) : (
                                    <div className="mt-auto bg-white p-1 border border-gray-200 rounded shadow-sm z-10 inline-block">
                                        <img src={qrUrl} alt="QR Code" className="w-[104px] h-[104px]" />
                                    </div>
                                )}
                                <p className={`text-[8px] mt-3 z-10 font-bold uppercase tracking-widest ${isBlocked ? "text-red-500" : "text-gray-400"}`}>
                                    {isBlocked ? "BLOQUEADO PELA RECEPÇÃO" : "Apresente na Recepção"}
                                </p>
                            </div>
                        </div>
                        <button onClick={() => window.print()} className="mt-6 px-6 py-2 bg-gray-800 text-white rounded-lg text-sm font-bold hover:bg-black transition shadow-md flex items-center justify-center gap-2 w-full">
                            <i className="fa-solid fa-print"></i> Salvar / Imprimir
                        </button>
                    </div>
                </Modal>
            );
        };

        const DashboardView = ({ student, notices, ranking, onOpenCard }) => {
            const firstName = student.name ? student.name.split(" ")[0] : "Aluno";
            const attendanceCount = student.attendance ? student.attendance.length : 0;
            
            // Calendar Logic
            const today = new Date();
            const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).getDay();
            
            let monthlyAttendance = 0;
            const days = [];
            
            for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="calendar-day empty"></div>);
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isPresent = student.attendance?.includes(dateStr);
                if (isPresent) monthlyAttendance++;
                
                days.push(
                    <div key={`day-${i}`} className={`calendar-day ${isPresent ? "present" : "bg-gray-50 dark:bg-gray-700/50 shadow-sm"}`}>
                        {i}
                    </div>
                );
            }

            return (
                <div className="animate-fade-in space-y-6">
                    {/* Header */}
                    <div className="flex justify-between items-end border-b border-gray-200 dark:border-gray-700 pb-4">
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 rounded-full bg-gray-200 dark:bg-gray-700 border-2 border-white dark:border-gray-800 shadow-md overflow-hidden shrink-0">
                                {student.photoBase64 ? 
                                    <img src={student.photoBase64} className="w-full h-full object-cover" /> : 
                                    <div className="w-full h-full flex items-center justify-center text-gray-500 text-2xl font-bold">{firstName.charAt(0)}</div>
                                }
                            </div>
                            <div>
                                <p className="text-gray-500 dark:text-gray-400 text-sm uppercase font-bold tracking-wider mb-1">Bem-vindo(a) de volta,</p>
                                <div className="flex items-center gap-3">
                                    <h1 className="text-3xl md:text-4xl font-display font-bold text-brand-dark dark:text-white">{firstName}</h1>
                                    <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider text-white shadow-sm ${student.paymentStatus === 'Pendente' ? 'bg-red-500' : 'bg-green-500'}`}>
                                        {student.paymentStatus === 'Pendente' ? 'Pendente' : 'Ativo'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Quick Actions */}
                    <button onClick={onOpenCard} className="w-full bg-gradient-to-r from-brand-dark to-gray-800 dark:from-gray-800 dark:to-gray-900 text-white font-bold py-4 px-6 rounded-2xl shadow-xl flex items-center justify-between transition transform hover:-translate-y-1 border border-gray-700">
                        <div className="flex items-center gap-4 text-left">
                            <div className="w-14 h-14 bg-brand-red rounded-full flex items-center justify-center shadow-inner shrink-0">
                                <i className="fa-solid fa-qrcode text-2xl"></i>
                            </div>
                            <div>
                                <span className="block text-lg md:text-xl font-display uppercase tracking-widest text-brand-red">Carteirinha Digital</span>
                                <span className="block text-xs md:text-sm text-gray-300 font-normal mt-1">Toque aqui para abrir o seu QR Code</span>
                            </div>
                        </div>
                    </button>

                    {/* Notices */}
                    {notices && notices.length > 0 && (
                        <div>
                            <h3 className="font-display text-xl font-bold text-gray-700 dark:text-gray-200 mb-3 flex items-center gap-2">
                                <i className="fa-solid fa-bullhorn text-yellow-500"></i> Quadro de Avisos
                            </h3>
                            <div className="space-y-3">
                                {notices.map(notice => (
                                    <AlertBox key={notice.id} type={notice.type || 'info'} title={notice.title} message={notice.text} />
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Stats Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Graduation */}
                            <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border-l-4 border-brand-red">
                                <h3 className="text-gray-400 dark:text-gray-500 text-xs font-bold uppercase tracking-widest">Graduação Atual</h3>
                                <p className="text-xl font-bold text-brand-dark dark:text-white mt-1 mb-4">{student.belt || "Faixa Branca - 0º Grau"}</p>
                                <div className="w-full h-12 rounded border border-gray-200 dark:border-gray-600 shadow-inner overflow-hidden">
                                    <BeltDisplay beltStr={student.belt || "Faixa Branca - 0º Grau"} />
                                </div>
                            </div>
                            
                            {/* Finance Summary */}
                            <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border-l-4 border-gray-800 dark:border-gray-600">
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="text-gray-400 dark:text-gray-500 text-xs font-bold uppercase tracking-widest">Financeiro</h3>
                                        <div className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-bold mt-2 ${student.paymentStatus === 'Pendente' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                                            {student.paymentStatus === 'Pendente' ? <><i className="fa-solid fa-triangle-exclamation mr-1"></i> Pendente</> : <><i className="fa-solid fa-check-circle mr-1"></i> Em dia</>}
                                        </div>
                                    </div>
                                    <div className={`p-2 rounded-lg ${student.paymentStatus === 'Pendente' ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-500'}`}>
                                        <i className="fa-solid fa-wallet text-xl"></i>
                                    </div>
                                </div>
                                <p className="text-sm text-gray-600 dark:text-gray-300">Plano: <span className="font-bold text-brand-dark dark:text-white uppercase">{student.plan || "Padrão"}</span></p>
                            </div>
                        </div>

                        {/* Calendar */}
                        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border-t-4 border-blue-500 flex flex-col">
                            <h3 className="text-gray-400 dark:text-gray-500 text-xs font-bold uppercase tracking-widest flex items-center gap-2 mb-4">
                                <i className="fa-regular fa-calendar text-brand-red"></i> Frequência ({today.toLocaleString('pt-BR', { month: 'long' })})
                            </h3>
                            <div className="mb-4 flex-grow">
                                <div className="grid grid-cols-7 mb-2">
                                    {["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"].map(d => <div key={d} className="calendar-header-day">{d}</div>)}
                                </div>
                                <div className="calendar-grid">{days}</div>
                            </div>
                            <div className="pt-4 border-t border-gray-100 dark:border-gray-700 flex justify-between">
                                <span className="text-sm font-bold text-gray-600 dark:text-gray-300">Treinos (Mês/Total)</span>
                                <span className="text-lg font-bold"><span className="text-brand-red">{monthlyAttendance}</span> / <span className="text-blue-500">{attendanceCount}</span></span>
                            </div>
                        </div>
                    </div>
                    
                    {/* Bottom Row */}
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        {/* Ranking */}
                        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden border-t-4 border-brand-dark dark:border-gray-600 flex flex-col">
                            <div className="bg-gray-50 dark:bg-gray-700 px-6 py-4 border-b border-gray-200 dark:border-gray-600">
                                <h3 className="font-display text-xl font-bold text-brand-dark dark:text-white flex items-center gap-2">
                                    <i className="fa-solid fa-fire text-orange-500"></i> Top 5 Frequência
                                </h3>
                            </div>
                            <div className="p-0 overflow-y-auto max-h-[300px]">
                                <table className="w-full text-left text-sm">
                                    <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                                        {ranking && ranking.length > 0 ? ranking.map((r, i) => (
                                            <tr key={i} className="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                                                <td className="px-4 py-3 flex items-center justify-between">
                                                    <div className="flex items-center gap-3">
                                                        <span className={`font-bold w-6 text-center ${i === 0 ? 'text-yellow-500 text-lg' : i === 1 ? 'text-gray-400' : i === 2 ? 'text-amber-600' : 'text-gray-500'}`}>
                                                            {i < 3 ? <i className="fa-solid fa-medal"></i> : `${i+1}º`}
                                                        </span>
                                                        <div>
                                                            <p className="font-bold text-gray-800 dark:text-gray-200">{r.name.split(" ")[0]}</p>
                                                            <p className="text-[10px] text-gray-500 uppercase">{(r.belt||"").split("-")[0]}</p>
                                                        </div>
                                                    </div>
                                                    <span className="bg-brand-red text-white text-xs font-bold px-2 py-1 rounded">{r.classes} treinos</span>
                                                </td>
                                            </tr>
                                        )) : <tr><td className="p-4 text-center text-gray-500">Nenhum treino registrado.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Achievements */}
                        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border-t-4 border-yellow-500">
                            <h3 className="font-display text-xl font-bold text-gray-700 dark:text-gray-200 mb-4 flex items-center gap-2">
                                <i className="fa-solid fa-trophy text-yellow-500"></i> Minhas Conquistas
                            </h3>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 overflow-y-auto max-h-[300px] hide-scroll pr-2">
                                {ACHIEVEMENTS.map((ach, i) => {
                                    const unlocked = attendanceCount >= ach.req;
                                    return (
                                        <div key={i} className={`flex flex-col items-center p-3 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm transition-all ${unlocked ? 'bg-gradient-to-b from-white to-gray-50 dark:from-gray-700 dark:to-gray-800 ring-2 ring-yellow-400' : 'bg-gray-100 dark:bg-gray-800 opacity-50 grayscale'}`}>
                                            <div className="w-12 h-12 rounded-full bg-white dark:bg-gray-900 flex items-center justify-center text-2xl shadow-inner mb-2 border border-gray-100 dark:border-gray-600">
                                                <i className={`${ach.icon} ${ach.color}`}></i>
                                            </div>
                                            <p className="text-[10px] font-bold text-gray-800 dark:text-gray-200 uppercase tracking-wider text-center leading-tight mb-1 truncate w-full">{ach.name}</p>
                                            <p className="text-[8px] text-gray-500 dark:text-gray-400 text-center leading-tight line-clamp-2">{ach.desc}</p>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const FeedView = ({ feedData, currentUser, onRefresh }) => {
            return (

        // ==========================================

        const App = () => {
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [view, setView] = React.useState("dashboard");
            const [student, setStudent] = React.useState(null);
            const [notices, setNotices] = React.useState([]);
            const [feed, setFeed] = React.useState([]);
            const [ranking, setRanking] = React.useState([]);
            const [isDark, setIsDark] = React.useState(false);
            const [showCard, setShowCard] = React.useState(false);
            const [showEditProfile, setShowEditProfile] = React.useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

            React.useEffect(() => {
                const theme = localStorage.getItem("tanque_theme") || "light";
                if (theme === "dark" || (!localStorage.getItem("tanque_theme") && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    setIsDark(true);
                    document.documentElement.classList.add("dark");
                }

                initApp();
            }, []);

            const initApp = async () => {
                const sessionStr = localStorage.getItem("tanque_user_session");
                if (!sessionStr) {
                    window.location.href = "https://www.tanqueteambjj.com.br/login.html";
                    return;
                }
                const session = JSON.parse(sessionStr);
                
                try {
                    // Firebase Auth Rule 3
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    // Rule 1: Use specific artifacts paths
                    const studentRef = doc(db, "artifacts", appId, "public", "data", "students", session.id);
                    const studentSnap = await getDoc(studentRef);
                    
                    if (studentSnap.exists()) {
                        setStudent({ id: studentSnap.id, ...studentSnap.data() });
                        await loadNotices();
                        await loadRanking();
                    } else {
                        setError("Sua matrícula não foi encontrada.");
                    }
                } catch (e) {
                    console.error(e);
                    setError("Erro ao conectar ao servidor.");
                } finally {
                    setLoading(false);
                }
            };

            const loadNotices = async () => {
                try {
                    const noticesRef = collection(db, "artifacts", appId, "public", "data", "notices");
                    const snap = await getDocs(noticesRef);
                    const now = new Date();
                    const nList = [];
                    snap.forEach(doc => {
                        const data = doc.data();
                        if (!data.expiresAt || new Date(data.expiresAt) >= now) {
                            nList.push({ id: doc.id, ...data });
                        }
                    });
                    setNotices(nList);
                } catch (e) {}
            };

            const loadRanking = async () => {
                try {
                    const snap = await getDocs(collection(db, "artifacts", appId, "public", "data", "students"));
                    const currentMonth = new Date().getMonth();
                    const currentYear = new Date().getFullYear();
                    const rank = [];
                    
                    snap.forEach(doc => {
                        const d = doc.data();
                        if (d.archived || d.enrollmentStatus === "Inativo") return;
                        let count = 0;
                        if (d.attendance) {
                            d.attendance.forEach(att => {
                                const dt = new Date(att + "T12:00:00");
                                if (dt.getMonth() === currentMonth && dt.getFullYear() === currentYear) count++;
                            });
                        }
                        if (count > 0) rank.push({ name: d.name, belt: d.belt, classes: count });
                    });
                    
                    rank.sort((a, b) => b.classes - a.classes);
                    setRanking(rank.slice(0, 5));
                } catch (e) {}
            };

            const loadFeed = async () => {
                try {
                    const snap = await getDocs(collection(db, "artifacts", appId, "public", "data", "feed"));
                    const fList = [];
                    snap.forEach(doc => fList.push({ id: doc.id, ...doc.data() }));
                    fList.sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());
                    setFeed(fList);
                } catch(e) {}
            };

            const toggleTheme = () => {
                const newTheme = !isDark;
                setIsDark(newTheme);
                if (newTheme) {
                    document.documentElement.classList.add("dark");
                    localStorage.setItem("tanque_theme", "dark");
                } else {
                    document.documentElement.classList.remove("dark");
                    localStorage.setItem("tanque_theme", "light");
                }
            };

            const logout = () => {
                localStorage.removeItem("tanque_user_session");
                window.location.href = "https://www.tanqueteambjj.com.br/login.html";
            };

            const handleUpdateProfile = async (data) => {
                const ref = doc(db, "artifacts", appId, "public", "data", "students", student.id);
                await updateDoc(ref, data);
                setStudent({ ...student, ...data });
            };

            React.useEffect(() => {
                if (view === "feed") loadFeed();
            }, [view]);

            if (loading) return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-brand-dark">
                    <div className="text-center text-white font-display text-xl animate-pulse">A CARREGAR DOJO...</div>
                </div>
            );

            if (error) return (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/90 text-white p-4">
                    <i className="fa-solid fa-triangle-exclamation text-brand-red text-5xl mb-4"></i>
                    <h2 className="text-2xl font-bold mb-2">Acesso Restrito</h2>
                    <p className="text-gray-300 mb-6">{error}</p>
                    <button onClick={logout} className="px-6 py-2 bg-brand-red rounded font-bold">Voltar</button>
                </div>
            );

            const NavItem = ({ id, icon, label }) => (
                <button onClick={() => { setView(id); setMobileMenuOpen(false); }} className={`flex items-center px-4 py-3 rounded-lg transition-colors w-full text-left ${view === id ? "bg-brand-red text-white shadow-md" : "text-gray-400 hover:bg-gray-800 hover:text-white"}`}>
                    <i className={`fa-solid ${icon} w-6 text-center`}></i>
                    <span className="font-bold ml-2">{label}</span>
                </button>
            );

            return (
                <div className="flex h-screen overflow-hidden relative w-full bg-transparent">
                    {/* Mobile Overlay */}
                    {mobileMenuOpen && <div className="fixed inset-0 bg-black/60 z-30 md:hidden backdrop-blur-sm" onClick={() => setMobileMenuOpen(false)}></div>}
                    
                    {/* Sidebar */}
                    <aside className={`fixed md:relative inset-y-0 left-0 transform ${mobileMenuOpen ? "translate-x-0" : "-translate-x-full"} md:translate-x-0 w-64 bg-brand-dark text-white flex flex-col shadow-2xl z-40 transition-transform duration-300 ease-in-out border-r border-gray-800`}>
                        <div className="p-6 flex items-center justify-center border-b border-gray-800 relative">
                            <img src="https://iili.io/qC543c7.png" className="h-10 w-10 object-contain mr-2" alt="Logo" />
                            <span className="font-display font-bold text-xl tracking-wider">TANQUE TEAM</span>
                            <button onClick={() => setMobileMenuOpen(false)} className="md:hidden absolute top-4 right-4 text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2 flex flex-col">
                            <NavItem id="dashboard" icon="fa-chart-pie" label="Dashboard" />
                            <NavItem id="feed" icon="fa-users" label="Feed da Equipe" />
                            <NavItem id="profile" icon="fa-user-cog" label="Meus Dados" />
                            <NavItem id="finance" icon="fa-credit-card" label="Financeiro" />
                            <button onClick={toggleTheme} className="hidden md:flex mt-auto items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg w-full text-left">
                                <i className={`fa-solid ${isDark ? 'fa-sun' : 'fa-moon'} w-6 text-center`}></i>
                                <span className="ml-2">Modo {isDark ? "Claro" : "Noturno"}</span>
                            </button>
                        </nav>
                        <div className="p-4 border-t border-gray-800">
                            <button onClick={logout} className="flex items-center w-full px-4 py-2 text-red-400 hover:text-red-300 font-bold">
                                <i className="fa-solid fa-sign-out-alt w-6 text-center"></i><span className="ml-2">Sair</span>
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden relative w-full">
                        {/* Mobile Header */}
                        <header className="md:hidden bg-brand-dark border-b border-gray-800 text-white p-4 flex justify-between items-center shadow-md z-20 shrink-0">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setMobileMenuOpen(true)} className="text-white hover:text-brand-red"><i className="fa-solid fa-bars text-xl"></i></button>
                                <img src="https://iili.io/qC543c7.png" className="h-8 w-8 object-contain" alt="Logo" />
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={toggleTheme} className="text-yellow-400"><i className={`fa-solid ${isDark ? 'fa-sun' : 'fa-moon'} text-xl`}></i></button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-8 relative">
                            {view === "dashboard" && <DashboardView student={student} notices={notices} ranking={ranking} onOpenCard={() => setShowCard(true)} />}
                            {view === "feed" && <FeedView feedData={feed} currentUser={student} onRefresh={loadFeed} />}
                            {view === "finance" && <FinanceView student={student} />}
                            {view === "profile" && <ProfileView student={student} onEdit={() => setShowEditProfile(true)} />}
                        </main>
                    </div>

                    <DigitalCard student={student} isOpen={showCard} onClose={() => setShowCard(false)} />
                    <EditProfileModal isOpen={showEditProfile} onClose={() => setShowEditProfile(false)} student={student} onSave={handleUpdateProfile} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
