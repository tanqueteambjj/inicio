<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <i class="fas fa-dumbbell text-emerald-500 text-2xl"></i>
            <h1 class="text-xl font-bold">FitManager</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-emerald-500 text-white transition-colors">
                <i class="fas fa-chart-line w-5 text-center"></i> Dashboard
            </button>
            <button onclick="switchTab('students')" id="btn-students" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors">
                <i class="fas fa-users w-5 text-center"></i> Alunos
            </button>
            <button onclick="switchTab('plans')" id="btn-plans" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors">
                <i class="fas fa-tags w-5 text-center"></i> Planos
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b border-gray-200 h-16 flex items-center justify-between px-8 shrink-0">
            <h2 id="page-title" class="text-xl font-bold text-gray-800">Dashboard</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-gray-500">Admin</span>
                <div class="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-8">
            
            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content active space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm text-gray-500 font-medium">Total de Alunos</p>
                                <p id="stat-students" class="text-3xl font-bold text-gray-900 mt-1">0</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center text-xl">
                                <i class="fas fa-users"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm text-gray-500 font-medium">Planos Ativos</p>
                                <p id="stat-plans" class="text-3xl font-bold text-gray-900 mt-1">0</p>
                            </div>
                            <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-lg flex items-center justify-center text-xl">
                                <i class="fas fa-tags"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm text-gray-500 font-medium">Receita Mensal</p>
                                <p id="stat-revenue" class="text-3xl font-bold text-gray-900 mt-1">R$ 0,00</p>
                            </div>
                            <div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center text-xl">
                                <i class="fas fa-dollar-sign"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Students Tab -->
            <div id="tab-students" class="tab-content space-y-6">
                <div class="flex justify-between items-center">
                    <div class="relative w-64">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="search-student" onkeyup="renderStudents()" placeholder="Buscar aluno..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <button onclick="openModal('modal-student')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2">
                        <i class="fas fa-plus"></i> Novo Aluno
                    </button>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-sm text-gray-600">
                                <th class="p-4 font-semibold">Nome</th>
                                <th class="p-4 font-semibold">Email</th>
                                <th class="p-4 font-semibold">Plano Atual</th>
                                <th class="p-4 font-semibold text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="students-table-body" class="divide-y divide-gray-100">
                            <!-- Rows generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Plans Tab -->
            <div id="tab-plans" class="tab-content space-y-6">
                <div class="flex justify-end">
                    <button onclick="openModal('modal-plan')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2">
                        <i class="fas fa-plus"></i> Novo Plano
                    </button>
                </div>
                
                <div id="plans-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Cards generated by JS -->
                </div>
            </div>

        </div>
    </main>

    <!-- Modals -->

    <!-- Modal Create Plan -->
    <div id="modal-plan" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 class="text-lg font-bold text-gray-900">Criar Novo Plano</h3>
                <button onclick="closeModal('modal-plan')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="form-plan" onsubmit="handleCreatePlan(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Plano</label>
                    <input type="text" id="plan-name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Preço Mensal (R$)</label>
                    <input type="number" id="plan-price" step="0.01" min="0" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeModal('modal-plan')" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg transition-colors">Salvar Plano</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Create Student -->
    <div id="modal-student" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 class="text-lg font-bold text-gray-900">Adicionar Aluno</h3>
                <button onclick="closeModal('modal-student')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="form-student" onsubmit="handleCreateStudent(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                    <input type="text" id="student-name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="student-email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Plano Inicial</label>
                    <select id="student-plan" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="">Sem plano</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeModal('modal-student')" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg transition-colors">Salvar Aluno</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Change Plan -->
    <div id="modal-change-plan" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 class="text-lg font-bold text-gray-900">Alterar Plano</h3>
                <button onclick="closeModal('modal-change-plan')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="form-change-plan" onsubmit="handleChangePlan(event)" class="p-6 space-y-4">
                <input type="hidden" id="change-student-id">
                <p class="text-sm text-gray-600 mb-4">Aluno: <span id="change-student-name" class="font-bold text-gray-900"></span></p>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Novo Plano</label>
                    <select id="change-plan-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="">Nenhum plano (Remover)</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
                <div class="pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeModal('modal-change-plan')" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg transition-colors">Confirmar Alteração</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // State
        let plans = [
            { id: '1', name: 'Mensal Básico', price: 89.90 },
            { id: '2', name: 'Trimestral Premium', price: 239.90 },
            { id: '3', name: 'Anual VIP', price: 899.90 }
        ];

        let students = [
            { id: '1', name: 'Carlos Silva', email: 'carlos@email.com', planId: '1' },
            { id: '2', name: 'Ana Oliveira', email: 'ana@email.com', planId: '2' },
            { id: '3', name: 'Lucas Santos', email: 'lucas@email.com', planId: null }
        ];

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            renderAll();
        });

        // Navigation
        function switchTab(tabId) {
            // Update buttons
            document.querySelectorAll('aside button').forEach(btn => {
                btn.className = 'w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors';
            });
            document.getElementById(`btn-${tabId}`).className = 'w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-emerald-500 text-white transition-colors';

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');

            // Update title
            const titles = {
                'dashboard': 'Dashboard',
                'students': 'Gerenciar Alunos',
                'plans': 'Gerenciar Planos'
            };
            document.getElementById('page-title').innerText = titles[tabId];
        }

        // Modals
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
            if(modalId === 'modal-student' || modalId === 'modal-change-plan') {
                updatePlanSelects();
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            if(modalId === 'modal-plan') document.getElementById('form-plan').reset();
            if(modalId === 'modal-student') document.getElementById('form-student').reset();
        }

        // Render Functions
        function renderAll() {
            renderDashboard();
            renderStudents();
            renderPlans();
            updatePlanSelects();
        }

        function renderDashboard() {
            document.getElementById('stat-students').innerText = students.length;
            document.getElementById('stat-plans').innerText = plans.length;
            
            const revenue = students.reduce((total, student) => {
                const plan = plans.find(p => p.id === student.planId);
                return total + (plan ? plan.price : 0);
            }, 0);
            
            document.getElementById('stat-revenue').innerText = `R$ ${revenue.toFixed(2).replace('.', ',')}`;
        }

        function renderStudents() {
            const tbody = document.getElementById('students-table-body');
            const searchTerm = document.getElementById('search-student').value.toLowerCase();
            
            const filtered = students.filter(s => s.name.toLowerCase().includes(searchTerm) || s.email.toLowerCase().includes(searchTerm));
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500">Nenhum aluno encontrado.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(student => {
                const plan = plans.find(p => p.id === student.planId);
                const planBadge = plan 
                    ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">${plan.name}</span>`
                    : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">Sem plano</span>`;

                return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4 font-medium text-gray-900">${student.name}</td>
                        <td class="p-4 text-gray-600">${student.email}</td>
                        <td class="p-4">${planBadge}</td>
                        <td class="p-4 text-right space-x-2">
                            <button onclick="openChangePlan('${student.id}')" class="inline-flex items-center gap-1 px-3 py-1.5 text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-md transition-colors">
                                <i class="fas fa-edit"></i> Alterar Plano
                            </button>
                            <button onclick="deleteStudent('${student.id}')" class="inline-flex items-center gap-1 px-3 py-1.5 text-sm bg-red-50 text-red-600 hover:bg-red-100 rounded-md transition-colors">
                                <i class="fas fa-trash"></i> Excluir
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPlans() {
            const grid = document.getElementById('plans-grid');
            
            if (plans.length === 0) {
                grid.innerHTML = `<div class="col-span-3 p-8 text-center text-gray-500 bg-white rounded-xl border border-gray-200">Nenhum plano cadastrado.</div>`;
                return;
            }

            grid.innerHTML = plans.map(plan => {
                const count = students.filter(s => s.planId === plan.id).length;
                return `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold text-gray-900">${plan.name}</h3>
                            <button onclick="deletePlan('${plan.id}')" class="text-gray-400 hover:text-red-500 transition-colors">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        <div class="mb-6">
                            <span class="text-3xl font-bold text-gray-900">R$ ${plan.price.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <div class="mt-auto pt-4 border-t border-gray-100">
                            <p class="text-sm text-gray-500"><i class="fas fa-users mr-1"></i> ${count} aluno(s) inscrito(s)</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updatePlanSelects() {
            const options = `<option value="">Sem plano (Remover)</option>` + 
                plans.map(p => `<option value="${p.id}">${p.name} - R$ ${p.price.toFixed(2)}</option>`).join('');
            
            document.getElementById('student-plan').innerHTML = options;
            document.getElementById('change-plan-select').innerHTML = options;
        }

        // Actions
        function handleCreatePlan(e) {
            e.preventDefault();
            const name = document.getElementById('plan-name').value;
            const price = parseFloat(document.getElementById('plan-price').value);
            
            plans.push({
                id: Date.now().toString(),
                name,
                price
            });
            
            closeModal('modal-plan');
            renderAll();
        }

        function deletePlan(id) {
            if(confirm('Tem certeza que deseja excluir este plano? Alunos associados ficarão sem plano.')) {
                plans = plans.filter(p => p.id !== id);
                students = students.map(s => s.planId === id ? { ...s, planId: null } : s);
                renderAll();
            }
        }

        function handleCreateStudent(e) {
            e.preventDefault();
            const name = document.getElementById('student-name').value;
            const email = document.getElementById('student-email').value;
            const planId = document.getElementById('student-plan').value;
            
            students.push({
                id: Date.now().toString(),
                name,
                email,
                planId: planId || null
            });
            
            closeModal('modal-student');
            renderAll();
        }

        function deleteStudent(id) {
            if(confirm('Tem certeza que deseja excluir este aluno?')) {
                students = students.filter(s => s.id !== id);
                renderAll();
            }
        }

        function openChangePlan(studentId) {
            const student = students.find(s => s.id === studentId);
            if(student) {
                document.getElementById('change-student-id').value = student.id;
                document.getElementById('change-student-name').innerText = student.name;
                document.getElementById('change-plan-select').value = student.planId || '';
                openModal('modal-change-plan');
            }
        }

        function handleChangePlan(e) {
            e.preventDefault();
            const studentId = document.getElementById('change-student-id').value;
            const newPlanId = document.getElementById('change-plan-select').value;
            
            students = students.map(s => 
                s.id === studentId ? { ...s, planId: newPlanId || null } : s
            );
            
            closeModal('modal-change-plan');
            renderAll();
        }
    </script>
</body>
</html>
